<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comparativa Routing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-color: #8e44ad;
            --btn-color: #a29bfe;
            --current-color: #341f97; /* más oscuro para la página activa */
            --menu-bg: rgba(255,255,255,0.9);
            --menu-hover: #6c5ce7;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 40px;
            min-height: 100vh;
        }

        /* Menú superior */
        .menu-numeros {
            display: flex;
            justify-content: center;
            background-color: var(--menu-bg);
            padding: 15px 10px;
            border-radius: 20px;
            margin-bottom: 40px;
            gap: 20px;
        }

        .menu-item {
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: #2d3436;
            font-weight: 600;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .menu-item span.num {
            display: block;
            font-weight: 600;
            font-size: 1.5rem;
            width: 45px;
            height: 45px;
            line-height: 45px;
            border-radius: 50%;
            background-color: var(--btn-color);
            color: white;
            margin: 0 auto 5px auto;
            transition: all 0.3s ease;
        }

        .menu-item:hover span.num {
            background-color: var(--menu-hover);
        }

        .menu-item.active span.num {
            background-color: var(--current-color);
            transform: scale(1.2);
        }

        /* Tarjeta centrada y grande */
        .card-container {
            display: flex;
            flex: 1;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        .card-custom {
            background: white;
            border-radius: 24px;
            padding: 100px 60px; /* más grande */
            box-shadow: 0 20px 45px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 550px;
            width: 90%;
            animation: fadeIn 0.6s ease-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-weight: 600;
            font-size: 2rem; /* título más grande */
            color: #2d3436;
            margin-bottom: 40px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
        }

        .btn-custom {
            background-color: var(--btn-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            padding: 14px 45px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 18px rgba(162, 155, 254, 0.5);
        }

        .btn-custom:hover {
            background-color: #6c5ce7;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95);}
            to { opacity: 1; transform: scale(1);}
        }
    </style>
</head>
<body>

<!-- Menú superior -->
<div class="menu-numeros">
    <a href="index.html" class="menu-item active"><span class="num">1</span>Inicio</a>
    <a href="context.html" class="menu-item"><span class="num">2</span>Contexto</a>
    <a href="routing.html" class="menu-item"><span class="num">3</span>Routing</a>
    <a href="decision.html" class="menu-item"><span class="num">4</span>Decisión</a>
</div>

<!-- Tarjeta centrada -->
<div class="card-container">
    <div class="card-custom">
        <h1>Comparativa de protocolos de routing</h1>
        <div class="btn-container">
            <a href="context.html" class="btn-custom">Empezamos!!</a>
        </div>
    </div>
</div>

</body>
</html>
